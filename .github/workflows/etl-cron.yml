name: SICOP ETL Pipeline

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

concurrency:
  group: sicop-etl
  cancel-in-progress: false  # espera que el run anterior termine, no lo cancela

jobs:
  etl:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: services/etl/requirements.txt

      - name: Install dependencies
        run: pip install -r services/etl/requirements.txt
        # Sin cd — más limpio, mismo resultado

      - name: Run ETL Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          ENVIRONMENT: production
          LOG_LEVEL: INFO
        run: |
          cd services/etl
          python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: etl-logs-${{ github.run_id }}   # run_id evita colisión entre runs fallidos
          path: services/etl/*.log
          retention-days: 7

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        # Solo ejecuta si el secret existe — guard via env var
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H 'Content-type: application/json' \
              --data '{
                "text": "🚨 *SICOP ETL falló* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver logs>"
              }'
          else
            echo "SLACK_WEBHOOK_URL no configurado, skipping notification"
          fi
